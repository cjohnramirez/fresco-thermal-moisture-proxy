<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Temperature Serial Tester</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8f9fa;
      --panel: #ffffff;
      --panel-muted: #f1f3f5;
      --border: #d7dce2;
      --border-strong: #aab2bd;
      --text: #212529;
      --muted: #5f6872;
      --primary: #0066cc;
      --danger: #c92a2a;
      --ok: #087f5b;
      --warn: #b36b00;
      --code: #111827;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      font-size: 14px;
      line-height: 1.4;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      height: 34px;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 0 12px;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #ffffff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 20px;
      font-weight: 650;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .statusbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .status-item,
    .channel,
    .panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }

    .status-item {
      min-height: 58px;
      padding: 10px 12px;
    }

    .label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .value {
      overflow-wrap: anywhere;
      font-weight: 650;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(340px, 0.86fr) minmax(420px, 1.14fr);
      gap: 12px;
    }

    .channels {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .channel {
      display: grid;
      grid-template-columns: 92px 1fr 1fr 92px;
      align-items: center;
      gap: 12px;
      min-height: 78px;
      padding: 12px;
    }

    .channel-name {
      font-weight: 700;
    }

    .temperature {
      font-size: clamp(24px, 3.8vw, 38px);
      font-weight: 700;
      line-height: 1;
    }

    .temperature span {
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
    }

    .status-ok {
      color: var(--ok);
    }

    .status-warn {
      color: var(--warn);
    }

    .status-bad {
      color: var(--danger);
    }

    .panel {
      min-height: 240px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 46px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-muted);
      font-weight: 650;
    }

    .panel-body {
      padding: 12px;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 196px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--code);
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.45;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }

    th,
    td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    td.raw {
      max-width: 360px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .table-wrap {
      max-height: 390px;
      overflow: auto;
    }

    @media (max-width: 900px) {
      .app {
        width: min(100vw - 20px, 680px);
        padding: 14px 0;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }

      .statusbar,
      .grid {
        grid-template-columns: 1fr;
      }

      .channel {
        grid-template-columns: 88px 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="title">Temperature Serial Tester</div>
      <div class="actions">
        <button id="connectButton" class="primary" type="button">Connect serial</button>
        <button id="disconnectButton" type="button" disabled>Disconnect</button>
        <button id="sampleButton" type="button">Load sample</button>
        <button id="clearButton" type="button">Clear</button>
      </div>
    </div>

    <section class="statusbar" aria-label="Serial status">
      <div class="status-item">
        <div class="label">Port</div>
        <div id="portState" class="value">idle</div>
      </div>
      <div class="status-item">
        <div class="label">Baud</div>
        <div class="value">115200</div>
      </div>
      <div class="status-item">
        <div class="label">Data pins</div>
        <div class="value">GPIO 4, 16, 17</div>
      </div>
      <div class="status-item">
        <div class="label">Packets</div>
        <div id="packetCount" class="value">0</div>
      </div>
    </section>

    <section class="grid">
      <div>
        <div id="channelCards" class="channels"></div>

        <div class="panel">
          <div class="panel-header">
            <span>Raw input</span>
            <button id="parseButton" type="button">Parse text</button>
          </div>
          <div class="panel-body">
            <textarea id="rawInput" spellcheck="false"></textarea>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span>Parsed packets</span>
          <span id="lastSeen" class="label">none</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Channel</th>
                <th>Pin</th>
                <th>Status</th>
                <th>&deg;C</th>
                <th>&deg;F</th>
                <th>Raw</th>
              </tr>
            </thead>
            <tbody id="packetRows"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script>
    const baudRate = 115200;
    const maxRows = 120;
    const channelOrder = [
      { id: "d4", label: "D4", pin: 4 },
      { id: "d16", label: "D16", pin: 16 },
      { id: "d17", label: "D17", pin: 17 }
    ];

    const state = {
      buffer: "",
      latest: new Map(),
      packetCount: 0,
      port: null,
      reader: null,
      reading: false
    };

    const els = {
      channelCards: document.querySelector("#channelCards"),
      clearButton: document.querySelector("#clearButton"),
      connectButton: document.querySelector("#connectButton"),
      disconnectButton: document.querySelector("#disconnectButton"),
      lastSeen: document.querySelector("#lastSeen"),
      packetCount: document.querySelector("#packetCount"),
      packetRows: document.querySelector("#packetRows"),
      parseButton: document.querySelector("#parseButton"),
      portState: document.querySelector("#portState"),
      rawInput: document.querySelector("#rawInput"),
      sampleButton: document.querySelector("#sampleButton")
    };

    function numericValue(value) {
      if (value === null || value === undefined || value === "") {
        return null;
      }

      const numberValue = Number(value);
      return Number.isFinite(numberValue) ? numberValue : null;
    }

    function firstDefined(source, keys) {
      for (const key of keys) {
        if (Object.prototype.hasOwnProperty.call(source, key)) {
          return source[key];
        }
      }

      return undefined;
    }

    function parseJsonLine(line) {
      try {
        return JSON.parse(line);
      } catch (_error) {
        return null;
      }
    }

    function parseFallbackLine(line) {
      const pairs = {};
      const pairPattern = /([a-zA-Z_][\w]*)\s*[:=]\s*("[^"]*"|[-+]?\d+(?:\.\d+)?|[a-zA-Z_][\w]*)/g;
      let match = pairPattern.exec(line);

      while (match) {
        const rawValue = match[2].replace(/^"|"$/g, "");
        pairs[match[1]] = rawValue;
        match = pairPattern.exec(line);
      }

      if (Object.keys(pairs).length > 0) {
        return pairs;
      }

      const onlyNumber = numericValue(line.trim());
      return onlyNumber === null ? null : { tc: onlyNumber, ts: "ok", id: "d4", pin: 4 };
    }

    function normalizeChannel(source, fallbackId = "d4", fallbackPin = 4) {
      const tc = numericValue(firstDefined(source, ["tc", "tempC", "temperatureC", "temperature_c", "celsius", "temperature"]));
      const givenFahrenheit = numericValue(firstDefined(source, ["tf", "tempF", "temperatureF", "temperature_f", "fahrenheit"]));
      const tf = givenFahrenheit === null && tc !== null ? (tc * 9 / 5) + 32 : givenFahrenheit;
      const id = String(firstDefined(source, ["id", "channel", "name"]) || fallbackId);
      const pin = numericValue(firstDefined(source, ["pin", "gpio"])) ?? fallbackPin;
      const devices = numericValue(firstDefined(source, ["devices", "deviceCount", "sensors", "sensorCount"]));
      const status = String(firstDefined(source, ["ts", "status", "sensorStatus"]) || (tc === null ? "missing_value" : "ok"));

      return {
        devices,
        id,
        label: id.toUpperCase(),
        pin,
        status,
        tc,
        tf
      };
    }

    function normalizePacket(line) {
      const trimmed = line.trim();
      if (!trimmed) {
        return null;
      }

      const source = parseJsonLine(trimmed) || parseFallbackLine(trimmed);
      if (!source) {
        return {
          channels: [],
          raw: trimmed,
          status: "parse_error",
          totalSensors: null
        };
      }

      const channels = Array.isArray(source.channels)
        ? source.channels.map((channel, index) => {
          const fallback = channelOrder[index] || channelOrder[0];
          return normalizeChannel(channel, fallback.id, fallback.pin);
        })
        : [normalizeChannel(source, String(firstDefined(source, ["id", "channel", "name"]) || "d4"), numericValue(firstDefined(source, ["pin", "gpio"])) ?? 4)];

      return {
        channels,
        raw: trimmed,
        status: String(firstDefined(source, ["ts", "status"]) || "ok"),
        totalSensors: numericValue(firstDefined(source, ["sensors", "sensorCount", "deviceCount", "devices"]))
      };
    }

    function formatTemperature(value) {
      return value === null ? "--" : value.toFixed(2);
    }

    function statusClass(status) {
      if (status === "ok") {
        return "status-ok";
      }

      if (status === "boot" || status === "waiting" || status === "partial") {
        return "status-warn";
      }

      return "status-bad";
    }

    function channelDisplay(channel) {
      const known = channelOrder.find((item) => item.id === channel.id || item.pin === channel.pin);
      return known ? known.label : channel.label;
    }

    function renderChannelCards() {
      els.channelCards.innerHTML = "";

      channelOrder.forEach((channel) => {
        const latest = state.latest.get(channel.id) || {
          devices: null,
          id: channel.id,
          label: channel.label,
          pin: channel.pin,
          status: "waiting",
          tc: null,
          tf: null
        };

        const card = document.createElement("div");
        card.className = "channel";

        const appendBlock = (label, value, className = "value") => {
          const block = document.createElement("div");
          const labelEl = document.createElement("div");
          const valueEl = document.createElement("div");
          labelEl.className = "label";
          labelEl.textContent = label;
          valueEl.className = className;
          valueEl.textContent = value;
          block.appendChild(labelEl);
          block.appendChild(valueEl);
          card.appendChild(block);
        };

        appendBlock(channel.label, `GPIO ${channel.pin}`, "channel-name");

        const celsius = document.createElement("div");
        celsius.innerHTML = `<div class="label">Celsius</div><div class="temperature">${formatTemperature(latest.tc)} <span>&deg;C</span></div>`;
        card.appendChild(celsius);

        const fahrenheit = document.createElement("div");
        fahrenheit.innerHTML = `<div class="label">Fahrenheit</div><div class="temperature">${formatTemperature(latest.tf)} <span>&deg;F</span></div>`;
        card.appendChild(fahrenheit);

        appendBlock("Status", latest.status, `value ${statusClass(latest.status)}`);
        els.channelCards.appendChild(card);
      });
    }

    function appendHistoryRow(packet, channel) {
      const row = document.createElement("tr");
      const appendCell = (text, className = "") => {
        const cell = document.createElement("td");
        cell.textContent = text;
        if (className) {
          cell.className = className;
        }

        row.appendChild(cell);
      };

      appendCell(new Date().toLocaleTimeString());
      appendCell(channel ? channelDisplay(channel) : "--");
      appendCell(channel ? `GPIO ${channel.pin}` : "--");
      appendCell(channel ? channel.status : packet.status, statusClass(channel ? channel.status : packet.status));
      appendCell(channel ? formatTemperature(channel.tc) : "--");
      appendCell(channel ? formatTemperature(channel.tf) : "--");
      appendCell(packet.raw, "raw");
      els.packetRows.prepend(row);
    }

    function renderPacket(packet) {
      if (!packet) {
        return;
      }

      state.packetCount += 1;
      els.packetCount.textContent = String(state.packetCount);
      els.lastSeen.textContent = new Date().toLocaleTimeString();

      if (packet.channels.length === 0) {
        appendHistoryRow(packet, null);
      }

      packet.channels.forEach((channel) => {
        const known = channelOrder.find((item) => item.id === channel.id || item.pin === channel.pin);
        const key = known ? known.id : channel.id;
        state.latest.set(key, { ...channel, id: key, label: known ? known.label : channel.label });
        appendHistoryRow(packet, channel);
      });

      renderChannelCards();

      while (els.packetRows.children.length > maxRows) {
        els.packetRows.lastElementChild.remove();
      }
    }

    function parseLines(text) {
      text.split(/\r?\n/).forEach((line) => {
        const packet = normalizePacket(line);
        if (packet) {
          renderPacket(packet);
        }
      });
    }

    function appendRaw(text) {
      els.rawInput.value += text;
      els.rawInput.scrollTop = els.rawInput.scrollHeight;
    }

    function setPortState(text) {
      els.portState.textContent = text;
    }

    async function connectSerial() {
      if (!("serial" in navigator)) {
        setPortState("Web Serial unavailable");
        return;
      }

      try {
        state.port = await navigator.serial.requestPort();
        await state.port.open({ baudRate });
        state.reading = true;
        els.connectButton.disabled = true;
        els.disconnectButton.disabled = false;
        setPortState("connected");

        const decoder = new TextDecoder();
        while (state.port && state.port.readable && state.reading) {
          state.reader = state.port.readable.getReader();

          try {
            while (state.reading) {
              const result = await state.reader.read();
              if (result.done) {
                break;
              }

              const text = decoder.decode(result.value, { stream: true });
              appendRaw(text);
              state.buffer += text;

              const lines = state.buffer.split(/\r?\n/);
              state.buffer = lines.pop() || "";
              lines.forEach((line) => renderPacket(normalizePacket(line)));
            }
          } finally {
            state.reader.releaseLock();
            state.reader = null;
          }
        }
      } catch (error) {
        setPortState(error.message || "serial error");
      } finally {
        els.connectButton.disabled = false;
        els.disconnectButton.disabled = true;
        state.reading = false;
      }
    }

    async function disconnectSerial() {
      state.reading = false;

      if (state.reader) {
        await state.reader.cancel();
      }

      if (state.port) {
        await state.port.close();
        state.port = null;
      }

      setPortState("idle");
      els.connectButton.disabled = false;
      els.disconnectButton.disabled = true;
    }

    els.connectButton.addEventListener("click", connectSerial);
    els.disconnectButton.addEventListener("click", disconnectSerial);
    els.parseButton.addEventListener("click", () => parseLines(els.rawInput.value));
    els.sampleButton.addEventListener("click", () => {
      els.rawInput.value = [
        "{\"type\":\"temperature\",\"seq\":0,\"ms\":251,\"sensors\":3,\"ts\":\"boot\",\"channels\":[{\"id\":\"d4\",\"pin\":4,\"devices\":1,\"ts\":\"boot\",\"tc\":null,\"tf\":null},{\"id\":\"d16\",\"pin\":16,\"devices\":1,\"ts\":\"boot\",\"tc\":null,\"tf\":null},{\"id\":\"d17\",\"pin\":17,\"devices\":1,\"ts\":\"boot\",\"tc\":null,\"tf\":null}]}",
        "{\"type\":\"temperature\",\"seq\":1,\"ms\":1003,\"sensors\":3,\"ts\":\"ok\",\"channels\":[{\"id\":\"d4\",\"pin\":4,\"devices\":1,\"ts\":\"ok\",\"tc\":24.94,\"tf\":76.89},{\"id\":\"d16\",\"pin\":16,\"devices\":1,\"ts\":\"ok\",\"tc\":25.31,\"tf\":77.56},{\"id\":\"d17\",\"pin\":17,\"devices\":1,\"ts\":\"ok\",\"tc\":24.56,\"tf\":76.21}]}",
        "{\"type\":\"temperature\",\"seq\":2,\"ms\":2004,\"sensors\":2,\"ts\":\"partial\",\"channels\":[{\"id\":\"d4\",\"pin\":4,\"devices\":1,\"ts\":\"ok\",\"tc\":25.00,\"tf\":77.00},{\"id\":\"d16\",\"pin\":16,\"devices\":1,\"ts\":\"ok\",\"tc\":25.44,\"tf\":77.79},{\"id\":\"d17\",\"pin\":17,\"devices\":0,\"ts\":\"no_sensor\",\"tc\":null,\"tf\":null}]}"
      ].join("\n");
      parseLines(els.rawInput.value);
    });
    els.clearButton.addEventListener("click", () => {
      state.buffer = "";
      state.latest.clear();
      state.packetCount = 0;
      els.packetCount.textContent = "0";
      els.packetRows.innerHTML = "";
      els.rawInput.value = "";
      els.lastSeen.textContent = "none";
      renderChannelCards();
    });

    renderChannelCards();
  </script>
</body>
</html>
