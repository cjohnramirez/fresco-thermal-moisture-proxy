# Two firmware entry files share this project; each env builds only its own via
# build_src_filter:
#   nodemcu-32s -> src/temperature.cpp  (DS18B20 -> Supabase)
#   rain-gauge  -> src/rain_gauge.cpp   (tipping-bucket AP at 192.168.4.1)

[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
upload_speed = 115200
build_flags =
    -Iinclude
build_src_filter = -<*> +<temperature.cpp>
lib_deps =
    dfrobot/DFRobot_BMI160@^1.0.0
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0

[env:rain-gauge]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
upload_speed = 115200
build_flags =
    -Iinclude
build_src_filter = -<*> +<rain_gauge.cpp>
lib_deps =
    esp32async/AsyncTCP@^3.3.2
    esp32async/ESPAsyncWebServer@^3.6.0

[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17
test_build_src = yes
build_src_filter = +<compass/> +<comms/>
